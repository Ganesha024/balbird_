<svg width="700" height="400" viewBox="0 0 700 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="discuss1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0b1b3a;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#0b1b3a;stop-opacity:0.6" />
    </linearGradient>
    <linearGradient id="discuss2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f15a22;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#f15a22;stop-opacity:0.6" />
    </linearGradient>
  </defs>
  <!-- Intake Form -->
  <g transform="translate(50,100)">
    <rect x="0" y="0" width="300" height="200" rx="8" fill="url(#discuss1)" />
    <text x="20" y="30" fill="white" font-family="sans-serif" font-size="16" font-weight="600">Intake Form</text>
    <text x="20" y="55" fill="white" font-family="sans-serif" font-size="12">• Organization Details</text>
    <text x="20" y="75" fill="white" font-family="sans-serif" font-size="12">• Sector & Role</text>
    <text x="20" y="95" fill="white" font-family="sans-serif" font-size="12">• Program Interest</text>
    <text x="20" y="115" fill="white" font-family="sans-serif" font-size="12">• Capacity Focus</text>
    <text x="20" y="135" fill="white" font-family="sans-serif" font-size="12">• Compliance Maturity</text>
    <text x="20" y="155" fill="white" font-family="sans-serif" font-size="12">• Preferred Timeline</text>
    <text x="20" y="175" fill="white" font-family="sans-serif" font-size="12">• Discussion Topics</text>
  </g>
  
  <!-- Discussion Process -->
  <g transform="translate(380,100)">
    <rect x="0" y="0" width="280" height="200" rx="8" fill="url(#discuss2)" />
    <text x="20" y="30" fill="white" font-family="sans-serif" font-size="16" font-weight="600">Discussion Process</text>
    <text x="20" y="55" fill="white" font-family="sans-serif" font-size="12">1. Form Submission</text>
    <text x="20" y="75" fill="white" font-family="sans-serif" font-size="12">2. Review & Qualification</text>
    <text x="20" y="95" fill="white" font-family="sans-serif" font-size="12">3. Strategic Discussion</text>
    <text x="20" y="115" fill="white" font-family="sans-serif" font-size="12">4. Action Plan</text>
    <text x="20" y="135" fill="white" font-family="sans-serif" font-size="12">5. Follow-up & Support</text>
  </g>
  
  <!-- Connection -->
  <line x1="350" y1="200" x2="380" y2="200" stroke="#0b1b3a" stroke-width="3" marker-end="url(#arrow)" />
  
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#0b1b3a" />
    </marker>
  </defs>
</svg>

<svg width="700" height="400" viewBox="0 0 700 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="prog1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0b1b3a;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#0b1b3a;stop-opacity:0.6" />
    </linearGradient>
    <linearGradient id="prog2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f15a22;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#f15a22;stop-opacity:0.6" />
    </linearGradient>
    <linearGradient id="prog3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0b1b3a;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#0b1b3a;stop-opacity:0.6" />
    </linearGradient>
  </defs>
  <!-- Program Categories -->
  <g transform="translate(50,100)">
    <rect x="0" y="0" width="180" height="120" rx="8" fill="url(#prog1)" />
    <text x="90" y="30" text-anchor="middle" fill="white" font-family="sans-serif" font-size="14" font-weight="600">Capacity Building</text>
    <text x="20" y="55" fill="white" font-family="sans-serif" font-size="12">Capacity Enhancement</text>
    <text x="20" y="75" fill="white" font-family="sans-serif" font-size="12">Cluster Development</text>
    <text x="20" y="95" fill="white" font-family="sans-serif" font-size="12">Workforce Integration</text>
  </g>
  
  <g transform="translate(260,100)">
    <rect x="0" y="0" width="180" height="120" rx="8" fill="url(#prog2)" />
    <text x="90" y="30" text-anchor="middle" fill="white" font-family="sans-serif" font-size="14" font-weight="600">Compliance & Alignment</text>
    <text x="20" y="55" fill="white" font-family="sans-serif" font-size="12">Capability Compliance</text>
    <text x="20" y="75" fill="white" font-family="sans-serif" font-size="12">OEM Alignment</text>
    <text x="20" y="95" fill="white" font-family="sans-serif" font-size="12">Strategic Expansion</text>
  </g>
  
  <g transform="translate(470,100)">
    <rect x="0" y="0" width="180" height="80" rx="8" fill="url(#prog3)" />
    <text x="90" y="30" text-anchor="middle" fill="white" font-family="sans-serif" font-size="14" font-weight="600">International Programs</text>
    <text x="20" y="55" fill="white" font-family="sans-serif" font-size="12">Cross Country Bilateral</text>
  </g>
  
  <!-- Connections -->
  <line x1="230" y1="160" x2="260" y2="160" stroke="#0b1b3a" stroke-width="3" />
  <line x1="440" y1="160" x2="470" y2="160" stroke="#f15a22" stroke-width="3" />
</svg>

<svg width="800" height="400" viewBox="0 0 800 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f15a22;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#0b1b3a;stop-opacity:0.05" />
    </linearGradient>
    <radialGradient id="nodeGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#0b1b3a;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#f15a22;stop-opacity:0.8" />
    </radialGradient>
  </defs>
  <rect width="800" height="400" fill="url(#grad1)" />
  <g opacity="0.8">
    <!-- Central Hub -->
    <circle cx="400" cy="200" r="50" fill="url(#nodeGrad)" />
    <text x="400" y="210" text-anchor="middle" fill="white" font-family="sans-serif" font-size="16" font-weight="600">Network</text>
    
    <!-- Connected Nodes -->
    <circle cx="200" cy="150" r="30" fill="url(#nodeGrad)" />
    <text x="200" y="155" text-anchor="middle" fill="white" font-family="sans-serif" font-size="10" font-weight="600">Mfg</text>
    
    <circle cx="600" cy="150" r="30" fill="url(#nodeGrad)" />
    <text x="600" y="155" text-anchor="middle" fill="white" font-family="sans-serif" font-size="10" font-weight="600">OEM</text>
    
    <circle cx="200" cy="250" r="30" fill="url(#nodeGrad)" />
    <text x="200" y="255" text-anchor="middle" fill="white" font-family="sans-serif" font-size="10" font-weight="600">Assoc</text>
    
    <circle cx="600" cy="250" r="30" fill="url(#nodeGrad)" />
    <text x="600" y="255" text-anchor="middle" fill="white" font-family="sans-serif" font-size="10" font-weight="600">Finance</text>
    
    <!-- Connections -->
    <line x1="230" y1="150" x2="350" y2="200" stroke="#0b1b3a" stroke-width="3" />
    <line x1="570" y1="150" x2="450" y2="200" stroke="#f15a22" stroke-width="3" />
    <line x1="230" y1="250" x2="350" y2="200" stroke="#0b1b3a" stroke-width="3" />
    <line x1="570" y1="250" x2="450" y2="200" stroke="#f15a22" stroke-width="3" />
    
    <!-- New Joiner -->
    <circle cx="50" cy="200" r="25" fill="#f15a22" />
    <text x="50" y="205" text-anchor="middle" fill="white" font-family="sans-serif" font-size="12" font-weight="600">Join</text>
    <path d="M75 200 L125 200" stroke="#f15a22" stroke-width="4" marker-end="url(#arrow)" />
    
    <defs>
      <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L0,6 L9,3 z" fill="#f15a22" />
      </marker>
    </defs>
  </g>
</svg>

<svg width="800" height="400" viewBox="0 0 800 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f15a22;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#0b1b3a;stop-opacity:0.05" />
    </linearGradient>
    <radialGradient id="progGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#0b1b3a;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#f15a22;stop-opacity:0.8" />
    </radialGradient>
  </defs>
  <rect width="800" height="400" fill="url(#grad1)" />
  <g opacity="0.8">
    <!-- Timeline -->
    <line x1="100" y1="200" x2="700" y2="200" stroke="#0b1b3a" stroke-width="4" />
    
    <!-- Milestones -->
    <circle cx="150" cy="200" r="20" fill="url(#progGrad)" />
    <text x="150" y="205" text-anchor="middle" fill="white" font-family="sans-serif" font-size="10" font-weight="600">Capacity</text>
    
    <circle cx="250" cy="200" r="20" fill="url(#progGrad)" />
    <text x="250" y="205" text-anchor="middle" fill="white" font-family="sans-serif" font-size="10" font-weight="600">Capability</text>
    
    <circle cx="350" cy="200" r="20" fill="url(#progGrad)" />
    <text x="350" y="205" text-anchor="middle" fill="white" font-family="sans-serif" font-size="10" font-weight="600">Workforce</text>
    
    <circle cx="450" cy="200" r="20" fill="url(#progGrad)" />
    <text x="450" y="205" text-anchor="middle" fill="white" font-family="sans-serif" font-size="10" font-weight="600">OEM</text>
    
    <circle cx="550" cy="200" r="20" fill="url(#progGrad)" />
    <text x="550" y="205" text-anchor="middle" fill="white" font-family="sans-serif" font-size="10" font-weight="600">Cluster</text>
    
    <circle cx="650" cy="200" r="20" fill="url(#progGrad)" />
    <text x="650" y="205" text-anchor="middle" fill="white" font-family="sans-serif" font-size="10" font-weight="600">Expansion</text>
    
    <!-- Arrows -->
    <path d="M170 200 L230 200" stroke="#f15a22" stroke-width="3" marker-end="url(#arrow)" />
    <path d="M270 200 L330 200" stroke="#f15a22" stroke-width="3" marker-end="url(#arrow)" />
    <path d="M370 200 L430 200" stroke="#f15a22" stroke-width="3" marker-end="url(#arrow)" />
    <path d="M470 200 L530 200" stroke="#f15a22" stroke-width="3" marker-end="url(#arrow)" />
    <path d="M570 200 L630 200" stroke="#f15a22" stroke-width="3" marker-end="url(#arrow)" />
    
    <defs>
      <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L0,6 L9,3 z" fill="#f15a22" />
      </marker>
    </defs>
    
    <!-- Supporting elements -->
    <circle cx="300" cy="120" r="15" fill="#f15a22" />
    <text x="300" y="125" text-anchor="middle" fill="white" font-family="sans-serif" font-size="8" font-weight="600">Compliance</text>
    
    <circle cx="500" cy="120" r="15" fill="#0b1b3a" />
    <text x="500" y="125" text-anchor="middle" fill="white" font-family="sans-serif" font-size="8" font-weight="600">Bilateral</text>
    
    <circle cx="400" cy="280" r="15" fill="#f15a22" />
    <text x="400" y="285" text-anchor="middle" fill="white" font-family="sans-serif" font-size="8" font-weight="600">Capital</text>
  </g>
</svg>

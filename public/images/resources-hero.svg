<svg width="800" height="400" viewBox="0 0 800 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f15a22;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#0b1b3a;stop-opacity:0.05" />
    </linearGradient>
    <radialGradient id="resGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#0b1b3a;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#f15a22;stop-opacity:0.8" />
    </radialGradient>
  </defs>
  <rect width="800" height="400" fill="url(#grad1)" />
  <g opacity="0.8">
    <!-- Resource Library -->
    <rect x="100" y="100" width="600" height="200" rx="8" fill="url(#resGrad)" />
    <text x="400" y="130" text-anchor="middle" fill="white" font-family="sans-serif" font-size="18" font-weight="600">Resource Library</text>
    
    <!-- Books/Documents -->
    <rect x="150" y="150" width="80" height="120" rx="4" fill="#f15a22" />
    <rect x="250" y="150" width="80" height="120" rx="4" fill="#0b1b3a" />
    <rect x="350" y="150" width="80" height="120" rx="4" fill="#f15a22" />
    <rect x="450" y="150" width="80" height="120" rx="4" fill="#0b1b3a" />
    <rect x="550" y="150" width="80" height="120" rx="4" fill="#f15a22" />
    
    <!-- Labels -->
    <text x="190" y="285" text-anchor="middle" fill="#0b1b3a" font-family="sans-serif" font-size="12" font-weight="600">Guides</text>
    <text x="290" y="285" text-anchor="middle" fill="#f15a22" font-family="sans-serif" font-size="12" font-weight="600">Templates</text>
    <text x="390" y="285" text-anchor="middle" fill="#0b1b3a" font-family="sans-serif" font-size="12" font-weight="600">Checklists</text>
    <text x="490" y="285" text-anchor="middle" fill="#f15a22" font-family="sans-serif" font-size="12" font-weight="600">Frameworks</text>
    <text x="590" y="285" text-anchor="middle" fill="#0b1b3a" font-family="sans-serif" font-size="12" font-weight="600">Overviews</text>
    
    <!-- Access Points -->
    <circle cx="200" cy="50" r="20" fill="#0b1b3a" />
    <circle cx="400" cy="50" r="20" fill="#f15a22" />
    <circle cx="600" cy="50" r="20" fill="#0b1b3a" />
    <text x="200" y="55" text-anchor="middle" fill="white" font-family="sans-serif" font-size="10" font-weight="600">Mfg</text>
    <text x="400" y="55" text-anchor="middle" fill="white" font-family="sans-serif" font-size="10" font-weight="600">OEM</text>
    <text x="600" y="55" text-anchor="middle" fill="white" font-family="sans-serif" font-size="10" font-weight="600">Assoc</text>
  </g>
</svg>

<svg width="700" height="400" viewBox="0 0 700 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sector1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0b1b3a;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#0b1b3a;stop-opacity:0.6" />
    </linearGradient>
    <linearGradient id="sector2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f15a22;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#f15a22;stop-opacity:0.6" />
    </linearGradient>
    <linearGradient id="sector3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0b1b3a;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#0b1b3a;stop-opacity:0.6" />
    </linearGradient>
    <linearGradient id="sector4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f15a22;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#f15a22;stop-opacity:0.6" />
    </linearGradient>
    <linearGradient id="sector5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0b1b3a;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#0b1b3a;stop-opacity:0.6" />
    </linearGradient>
  </defs>
  <!-- Sectors -->
  <g transform="translate(50,100)">
    <rect x="0" y="0" width="100" height="60" rx="8" fill="url(#sector1)" />
    <text x="50" y="85" text-anchor="middle" fill="#0b1b3a" font-family="sans-serif" font-size="14" font-weight="600">Aerospace</text>
  </g>
  
  <g transform="translate(200,60)">
    <rect x="0" y="0" width="100" height="60" rx="8" fill="url(#sector2)" />
    <text x="50" y="85" text-anchor="middle" fill="#f15a22" font-family="sans-serif" font-size="14" font-weight="600">Auto EV</text>
  </g>
  
  <g transform="translate(350,100)">
    <rect x="0" y="0" width="100" height="60" rx="8" fill="url(#sector3)" />
    <text x="50" y="85" text-anchor="middle" fill="#0b1b3a" font-family="sans-serif" font-size="14" font-weight="600">Railway</text>
  </g>
  
  <g transform="translate(500,140)">
    <rect x="0" y="0" width="100" height="60" rx="8" fill="url(#sector4)" />
    <text x="50" y="85" text-anchor="middle" fill="#f15a22" font-family="sans-serif" font-size="14" font-weight="600">Marine</text>
  </g>
  
  <g transform="translate(275,200)">
    <rect x="0" y="0" width="100" height="60" rx="8" fill="url(#sector5)" />
    <text x="50" y="85" text-anchor="middle" fill="#0b1b3a" font-family="sans-serif" font-size="14" font-weight="600">Heavy</text>
  </g>
  
  <!-- Connections -->
  <line x1="150" y1="130" x2="200" y2="120" stroke="#0b1b3a" stroke-width="3" />
  <line x1="300" y1="120" x2="350" y2="130" stroke="#f15a22" stroke-width="3" />
  <line x1="450" y1="130" x2="500" y2="170" stroke="#0b1b3a" stroke-width="3" />
  <line x1="325" y1="260" x2="350" y2="130" stroke="#f15a22" stroke-width="3" />
</svg>

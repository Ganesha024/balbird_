<svg width="800" height="400" viewBox="0 0 800 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f15a22;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#0b1b3a;stop-opacity:0.05" />
    </linearGradient>
    <radialGradient id="sectorGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#0b1b3a;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#f15a22;stop-opacity:0.8" />
    </radialGradient>
  </defs>
  <rect width="800" height="400" fill="url(#grad1)" />
  <g opacity="0.8">
    <!-- Aerospace -->
    <g transform="translate(100,150)">
      <path d="M0 0 L40 20 L20 40 L0 40 Z" fill="url(#sectorGrad)" />
      <text x="20" y="55" text-anchor="middle" fill="#0b1b3a" font-family="sans-serif" font-size="12" font-weight="600">Aerospace</text>
    </g>
    
    <!-- Automotive EV -->
    <g transform="translate(250,120)">
      <rect x="0" y="0" width="60" height="30" rx="5" fill="url(#sectorGrad)" />
      <circle cx="15" cy="15" r="3" fill="#f15a22" />
      <circle cx="45" cy="15" r="3" fill="#f15a22" />
      <text x="30" y="55" text-anchor="middle" fill="#f15a22" font-family="sans-serif" font-size="12" font-weight="600">Auto EV</text>
    </g>
    
    <!-- Railway -->
    <g transform="translate(450,150)">
      <rect x="0" y="10" width="80" height="20" rx="10" fill="url(#sectorGrad)" />
      <rect x="10" y="0" width="60" height="10" rx="5" fill="#0b1b3a" />
      <text x="40" y="55" text-anchor="middle" fill="#0b1b3a" font-family="sans-serif" font-size="12" font-weight="600">Railway</text>
    </g>
    
    <!-- Marine -->
    <g transform="translate(600,180)">
      <path d="M0 30 L30 0 L60 30 L30 30 Z" fill="url(#sectorGrad)" />
      <text x="30" y="55" text-anchor="middle" fill="#f15a22" font-family="sans-serif" font-size="12" font-weight="600">Marine</text>
    </g>
    
    <!-- Heavy Mobility -->
    <g transform="translate(300,220)">
      <rect x="0" y="0" width="100" height="40" rx="5" fill="url(#sectorGrad)" />
      <rect x="10" y="10" width="80" height="20" rx="3" fill="#0b1b3a" />
      <text x="50" y="75" text-anchor="middle" fill="#0b1b3a" font-family="sans-serif" font-size="12" font-weight="600">Heavy Mobility</text>
    </g>
    
    <!-- Connections -->
    <line x1="140" y1="180" x2="250" y2="150" stroke="#0b1b3a" stroke-width="2" />
    <line x1="310" y1="150" x2="450" y2="180" stroke="#f15a22" stroke-width="2" />
    <line x1="530" y1="180" x2="600" y2="210" stroke="#0b1b3a" stroke-width="2" />
    <line x1="400" y1="260" x2="450" y2="180" stroke="#f15a22" stroke-width="2" />
  </g>
</svg>

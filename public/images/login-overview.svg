<svg width="700" height="400" viewBox="0 0 700 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="login1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0b1b3a;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#0b1b3a;stop-opacity:0.6" />
    </linearGradient>
    <linearGradient id="login2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f15a22;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#f15a22;stop-opacity:0.6" />
    </linearGradient>
  </defs>
  <!-- Login Form -->
  <g transform="translate(50,100)">
    <rect x="0" y="0" width="280" height="120" rx="8" fill="url(#login1)" />
    <text x="20" y="30" fill="white" font-family="sans-serif" font-size="16" font-weight="600">Secure Login</text>
    <text x="20" y="55" fill="white" font-family="sans-serif" font-size="12">• Email & Password</text>
    <text x="20" y="75" fill="white" font-family="sans-serif" font-size="12">• Role-Based Access</text>
    <text x="20" y="95" fill="white" font-family="sans-serif" font-size="12">• Encrypted Session</text>
  </g>
  
  <!-- Post-Login Access -->
  <g transform="translate(370,100)">
    <rect x="0" y="0" width="280" height="120" rx="8" fill="url(#login2)" />
    <text x="20" y="30" fill="white" font-family="sans-serif" font-size="16" font-weight="600">Post-Login Access</text>
    <text x="20" y="55" fill="white" font-family="sans-serif" font-size="12">• Role-Specific Dashboard</text>
    <text x="20" y="75" fill="white" font-family="sans-serif" font-size="12">• Customized Tools</text>
    <text x="20" y="95" fill="white" font-family="sans-serif" font-size="12">• Secure Data Access</text>
  </g>
  
  <!-- Connection -->
  <line x1="330" y1="160" x2="370" y2="160" stroke="#0b1b3a" stroke-width="3" marker-end="url(#arrow)" />
  
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#0b1b3a" />
    </marker>
  </defs>
</svg>

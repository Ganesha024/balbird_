<svg width="700" height="400" viewBox="0 0 700 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="stake1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0b1b3a;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#0b1b3a;stop-opacity:0.6" />
    </linearGradient>
    <linearGradient id="stake2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f15a22;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#f15a22;stop-opacity:0.6" />
    </linearGradient>
    <linearGradient id="stake3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0b1b3a;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#0b1b3a;stop-opacity:0.6" />
    </linearGradient>
  </defs>
  <!-- Stakeholder Groups -->
  <g transform="translate(50,100)">
    <rect x="0" y="0" width="180" height="120" rx="8" fill="url(#stake1)" />
    <text x="90" y="30" text-anchor="middle" fill="white" font-family="sans-serif" font-size="14" font-weight="600">Core Production</text>
    <text x="20" y="55" fill="white" font-family="sans-serif" font-size="12">Manufacturers</text>
    <text x="20" y="75" fill="white" font-family="sans-serif" font-size="12">OEM Tiers</text>
    <text x="20" y="95" fill="white" font-family="sans-serif" font-size="12">Students</text>
  </g>
  
  <g transform="translate(260,100)">
    <rect x="0" y="0" width="180" height="120" rx="8" fill="url(#stake2)" />
    <text x="90" y="30" text-anchor="middle" fill="white" font-family="sans-serif" font-size="14" font-weight="600">Support Network</text>
    <text x="20" y="55" fill="white" font-family="sans-serif" font-size="12">Associations</text>
    <text x="20" y="75" fill="white" font-family="sans-serif" font-size="12">Advisors</text>
    <text x="20" y="95" fill="white" font-family="sans-serif" font-size="12">Finance</text>
  </g>
  
  <g transform="translate(470,100)">
    <rect x="0" y="0" width="180" height="80" rx="8" fill="url(#stake3)" />
    <text x="90" y="30" text-anchor="middle" fill="white" font-family="sans-serif" font-size="14" font-weight="600">Trade & Commerce</text>
    <text x="20" y="55" fill="white" font-family="sans-serif" font-size="12">International Partners</text>
  </g>
  
  <!-- Arrows -->
  <path d="M230 160 L260 160" stroke="#0b1b3a" stroke-width="3" marker-end="url(#arrow)" />
  <path d="M440 160 L470 160" stroke="#f15a22" stroke-width="3" marker-end="url(#arrow)" />
  
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#0b1b3a" />
    </marker>
  </defs>
</svg>

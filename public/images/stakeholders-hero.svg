<svg width="800" height="400" viewBox="0 0 800 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f15a22;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#0b1b3a;stop-opacity:0.05" />
    </linearGradient>
    <radialGradient id="stakeGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#0b1b3a;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#f15a22;stop-opacity:0.8" />
    </radialGradient>
  </defs>
  <rect width="800" height="400" fill="url(#grad1)" />
  <g opacity="0.8">
    <!-- Manufacturer -->
    <circle cx="150" cy="200" r="35" fill="url(#stakeGrad)" />
    <text x="150" y="205" text-anchor="middle" fill="white" font-family="sans-serif" font-size="12" font-weight="600">Mfg</text>
    
    <!-- OEM -->
    <circle cx="300" cy="150" r="35" fill="url(#stakeGrad)" />
    <text x="300" y="155" text-anchor="middle" fill="white" font-family="sans-serif" font-size="12" font-weight="600">OEM</text>
    
    <!-- Association -->
    <circle cx="450" cy="200" r="35" fill="url(#stakeGrad)" />
    <text x="450" y="205" text-anchor="middle" fill="white" font-family="sans-serif" font-size="12" font-weight="600">Assoc</text>
    
    <!-- Workforce -->
    <circle cx="600" cy="150" r="35" fill="url(#stakeGrad)" />
    <text x="600" y="155" text-anchor="middle" fill="white" font-family="sans-serif" font-size="12" font-weight="600">Workforce</text>
    
    <!-- Advisor -->
    <circle cx="250" cy="280" r="25" fill="#f15a22" />
    <text x="250" y="285" text-anchor="middle" fill="white" font-family="sans-serif" font-size="10" font-weight="600">Advisor</text>
    
    <!-- Finance -->
    <circle cx="400" cy="320" r="25" fill="#0b1b3a" />
    <text x="400" y="325" text-anchor="middle" fill="white" font-family="sans-serif" font-size="10" font-weight="600">Finance</text>
    
    <!-- Trade -->
    <circle cx="550" cy="280" r="25" fill="#f15a22" />
    <text x="550" y="285" text-anchor="middle" fill="white" font-family="sans-serif" font-size="10" font-weight="600">Trade</text>
    
    <!-- Connections -->
    <line x1="185" y1="200" x2="265" y2="165" stroke="#0b1b3a" stroke-width="3" />
    <line x1="335" y1="165" x2="415" y2="200" stroke="#f15a22" stroke-width="3" />
    <line x1="485" y1="200" x2="565" y2="165" stroke="#0b1b3a" stroke-width="3" />
    <line x1="275" y1="305" x2="375" y2="305" stroke="#f15a22" stroke-width="3" />
    <line x1="425" y1="305" x2="525" y2="305" stroke="#0b1b3a" stroke-width="3" />
  </g>
</svg>

<svg width="700" height="400" viewBox="0 0 700 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="role1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0b1b3a;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#0b1b3a;stop-opacity:0.6" />
    </linearGradient>
    <linearGradient id="role2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f15a22;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#f15a22;stop-opacity:0.6" />
    </linearGradient>
    <linearGradient id="role3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0b1b3a;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#0b1b3a;stop-opacity:0.6" />
    </linearGradient>
  </defs>
  <!-- Role Categories -->
  <g transform="translate(50,100)">
    <rect x="0" y="0" width="150" height="100" rx="8" fill="url(#role1)" />
    <text x="75" y="30" text-anchor="middle" fill="white" font-family="sans-serif" font-size="14" font-weight="600">Manufacturing</text>
    <text x="20" y="55" fill="white" font-family="sans-serif" font-size="10">Manufacturers</text>
    <text x="20" y="75" fill="white" font-family="sans-serif" font-size="10">OEM Tiers</text>
    <text x="20" y="95" fill="white" font-family="sans-serif" font-size="10">Students</text>
  </g>
  
  <g transform="translate(250,100)">
    <rect x="0" y="0" width="150" height="100" rx="8" fill="url(#role2)" />
    <text x="75" y="30" text-anchor="middle" fill="white" font-family="sans-serif" font-size="14" font-weight="600">Support</text>
    <text x="20" y="55" fill="white" font-family="sans-serif" font-size="10">Associations</text>
    <text x="20" y="75" fill="white" font-family="sans-serif" font-size="10">Advisors</text>
    <text x="20" y="95" fill="white" font-family="sans-serif" font-size="10">Finance</text>
  </g>
  
  <g transform="translate(450,100)">
    <rect x="0" y="0" width="150" height="100" rx="8" fill="url(#role3)" />
    <text x="75" y="30" text-anchor="middle" fill="white" font-family="sans-serif" font-size="14" font-weight="600">Trade</text>
    <text x="20" y="55" fill="white" font-family="sans-serif" font-size="10">Trade Partners</text>
    <text x="20" y="75" fill="white" font-family="sans-serif" font-size="10">International</text>
    <text x="20" y="95" fill="white" font-family="sans-serif" font-size="10">Cross-border</text>
  </g>
  
  <!-- Arrows -->
  <path d="M200 150 L250 150" stroke="#0b1b3a" stroke-width="3" marker-end="url(#arrow)" />
  <path d="M400 150 L450 150" stroke="#f15a22" stroke-width="3" marker-end="url(#arrow)" />
  
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#0b1b3a" />
    </marker>
  </defs>
</svg>

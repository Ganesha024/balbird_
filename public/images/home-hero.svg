<svg width="800" height="400" viewBox="0 0 800 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="factoryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#f15a22;stop-opacity:0.6" />
    </linearGradient>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87ceeb" />
      <stop offset="100%" style="stop-color:#ffffff" />
    </linearGradient>
  </defs>
  <!-- Background Sky -->
  <rect width="800" height="200" fill="url(#skyGrad)" />
  <!-- Ground -->
  <rect y="200" width="800" height="200" fill="#f8f9fa" />
  
  <!-- Factory Building -->
  <rect x="300" y="150" width="200" height="120" fill="url(#factoryGrad)" rx="10" />
  <!-- Windows -->
  <rect x="320" y="170" width="40" height="30" fill="#ffffff" opacity="0.8" rx="2" />
  <rect x="380" y="170" width="40" height="30" fill="#ffffff" opacity="0.8" rx="2" />
  <rect x="440" y="170" width="40" height="30" fill="#ffffff" opacity="0.8" rx="2" />
  
  <!-- Chimney -->
  <rect x="400" y="100" width="20" height="50" fill="#666" />
  <ellipse cx="410" cy="95" rx="15" ry="10" fill="#666" />
  
  <!-- Conveyer Belt -->
  <rect x="250" y="240" width="300" height="10" fill="#e9ecef" />
  <rect x="260" y="235" width="280" height="20" fill="#666" />
  
  <!-- Vehicles -->
  <circle cx="150" cy="280" r="20" fill="#f15a22" />
  <circle cx="150" cy="280" r="15" fill="#ffffff" />
  <rect x="130" y="270" width="40" height="15" fill="#1e3a8a" rx="5" />
  
  <circle cx="650" cy="280" r="20" fill="#f15a22" />
  <circle cx="650" cy="280" r="15" fill="#ffffff" />
  <rect x="630" y="270" width="40" height="15" fill="#1e3a8a" rx="5" />
  
  <!-- Gears -->
  <circle cx="100" cy="200" r="15" fill="#f15a22" />
  <circle cx="700" cy="200" r="15" fill="#1e3a8a" />
  
  <!-- Text -->
  <text x="400" y="350" text-anchor="middle" fill="#1e3a8a" font-family="sans-serif" font-size="16" font-weight="600">Modern Manufacturing Excellence</text>
</svg>

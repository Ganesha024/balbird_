<svg width="600" height="300" viewBox="0 0 600 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sectorBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa" />
      <stop offset="100%" style="stop-color:#e9ecef" />
    </linearGradient>
  </defs>
  
  <!-- Aerospace -->
  <g transform="translate(50,50)">
    <rect x="0" y="0" width="80" height="80" rx="8" fill="url(#sectorBg)" stroke="#1e3a8a" stroke-width="2" />
    <!-- Plane Icon -->
    <path d="M10 50 L30 35 L50 40 L65 35 L70 40 L70 45 L65 50 L50 45 L30 50 L10 50" fill="#1e3a8a" />
    <rect x="25" y="40" width="8" height="2" fill="#1e3a8a" />
    <text x="40" y="90" text-anchor="middle" fill="#1e3a8a" font-family="sans-serif" font-size="12" font-weight="600">Aerospace</text>
  </g>
  
  <!-- Automotive -->
  <g transform="translate(150,50)">
    <rect x="0" y="0" width="80" height="80" rx="8" fill="url(#sectorBg)" stroke="#f15a22" stroke-width="2" />
    <!-- Car Icon -->
    <rect x="10" y="35" width="60" height="25" rx="5" fill="#f15a22" />
    <circle cx="20" cy="60" r="8" fill="#666" />
    <circle cx="60" cy="60" r="8" fill="#666" />
    <rect x="15" y="30" width="50" height="10" rx="2" fill="#f15a22" />
    <text x="40" y="90" text-anchor="middle" fill="#f15a22" font-family="sans-serif" font-size="12" font-weight="600">Automotive</text>
  </g>
  
  <!-- Electric Vehicles -->
  <g transform="translate(250,50)">
    <rect x="0" y="0" width="80" height="80" rx="8" fill="url(#sectorBg)" stroke="#1e3a8a" stroke-width="2" />
    <!-- EV Icon -->
    <rect x="10" y="35" width="60" height="25" rx="5" fill="#1e3a8a" />
    <circle cx="20" cy="60" r="8" fill="#666" />
    <circle cx="60" cy="60" r="8" fill="#666" />
    <rect x="15" y="30" width="50" height="10" rx="2" fill="#1e3a8a" />
    <!-- Lightning -->
    <path d="M35 25 L40 15 L42 20 L47 10 L50 15 L45 25 Z" fill="#f15a22" />
    <text x="40" y="90" text-anchor="middle" fill="#1e3a8a" font-family="sans-serif" font-size="10" font-weight="600">Electric</text>
    <text x="40" y="105" text-anchor="middle" fill="#1e3a8a" font-family="sans-serif" font-size="10" font-weight="600">Vehicles</text>
  </g>
  
  <!-- Railway -->
  <g transform="translate(350,50)">
    <rect x="0" y="0" width="80" height="80" rx="8" fill="url(#sectorBg)" stroke="#f15a22" stroke-width="2" />
    <!-- Train Icon -->
    <rect x="10" y="40" width="60" height="20" rx="5" fill="#f15a22" />
    <circle cx="20" cy="60" r="8" fill="#666" />
    <circle cx="40" cy="60" r="8" fill="#666" />
    <circle cx="60" cy="60" r="8" fill="#666" />
    <rect x="10" y="35" width="15" height="10" fill="#f15a22" />
    <text x="40" y="90" text-anchor="middle" fill="#f15a22" font-family="sans-serif" font-size="12" font-weight="600">Railway</text>
  </g>
  
  <!-- Marine -->
  <g transform="translate(450,50)">
    <rect x="0" y="0" width="80" height="80" rx="8" fill="url(#sectorBg)" stroke="#1e3a8a" stroke-width="2" />
    <!-- Ship Icon -->
    <path d="M10 50 L70 50 L65 60 L15 60 Z" fill="#1e3a8a" />
    <rect x="30" y="40" width="20" height="15" fill="#1e3a8a" />
    <text x="40" y="90" text-anchor="middle" fill="#1e3a8a" font-family="sans-serif" font-size="12" font-weight="600">Marine</text>
  </g>
  
  <!-- Heavy Mobility -->
  <g transform="translate(550,50)">
    <rect x="0" y="0" width="80" height="80" rx="8" fill="url(#sectorBg)" stroke="#f15a22" stroke-width="2" />
    <!-- Truck Icon -->
    <rect x="10" y="35" width="50" height="25" rx="5" fill="#f15a22" />
    <circle cx="20" cy="60" r="8" fill="#666" />
    <circle cx="50" cy="60" r="8" fill="#666" />
    <rect x="50" y="35" width="15" height="15" fill="#f15a22" />
    <text x="40" y="90" text-anchor="middle" fill="#f15a22" font-family="sans-serif" font-size="10" font-weight="600">Heavy</text>
    <text x="40" y="105" text-anchor="middle" fill="#f15a22" font-family="sans-serif" font-size="10" font-weight="600">Mobility</text>
  </g>
  
  <!-- Connections -->
  <line x1="90" y1="130" x2="190" y2="130" stroke="#1e3a8a" stroke-width="2" />
  <line x1="230" y1="130" x2="330" y2="130" stroke="#f15a22" stroke-width="2" />
  <line x1="390" y1="130" x2="490" y2="130" stroke="#1e3a8a" stroke-width="2" />
  <line x1="530" y1="130" x2="590" y2="130" stroke="#f15a22" stroke-width="2" />
</svg>

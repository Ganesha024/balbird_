<svg width="700" height="400" viewBox="0 0 700 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pillar1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0b1b3a;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#0b1b3a;stop-opacity:0.6" />
    </linearGradient>
    <linearGradient id="pillar2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f15a22;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#f15a22;stop-opacity:0.6" />
    </linearGradient>
    <linearGradient id="pillar3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0b1b3a;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#0b1b3a;stop-opacity:0.6" />
    </linearGradient>
    <linearGradient id="pillar4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f15a22;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#f15a22;stop-opacity:0.6" />
    </linearGradient>
    <linearGradient id="pillar5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0b1b3a;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#0b1b3a;stop-opacity:0.6" />
    </linearGradient>
  </defs>
  <!-- Pillars -->
  <rect x="50" y="60" width="80" height="220" rx="8" fill="url(#pillar1)" />
  <rect x="200" y="40" width="80" height="240" rx="8" fill="url(#pillar2)" />
  <rect x="350" y="80" width="80" height="200" rx="8" fill="url(#pillar3)" />
  <rect x="500" y="50" width="80" height="230" rx="8" fill="url(#pillar4)" />
  <rect x="600" y="100" width="60" height="180" rx="8" fill="url(#pillar5)" />
  
  <!-- Labels -->
  <text x="90" y="300" text-anchor="middle" fill="#0b1b3a" font-family="sans-serif" font-size="12" font-weight="600">Mfg Units</text>
  <text x="240" y="300" text-anchor="middle" fill="#f15a22" font-family="sans-serif" font-size="12" font-weight="600">OEM Prog</text>
  <text x="390" y="300" text-anchor="middle" fill="#0b1b3a" font-family="sans-serif" font-size="12" font-weight="600">Workforce</text>
  <text x="540" y="300" text-anchor="middle" fill="#f15a22" font-family="sans-serif" font-size="12" font-weight="600">Assoc</text>
  <text x="630" y="300" text-anchor="middle" fill="#0b1b3a" font-family="sans-serif" font-size="12" font-weight="600">Finance</text>
  
  <!-- Connections -->
  <line x1="130" y1="170" x2="200" y2="160" stroke="#0b1b3a" stroke-width="2" />
  <line x1="280" y1="160" x2="350" y2="180" stroke="#f15a22" stroke-width="2" />
  <line x1="430" y1="180" x2="500" y2="160" stroke="#0b1b3a" stroke-width="2" />
  <line x1="580" y1="160" x2="600" y2="190" stroke="#f15a22" stroke-width="2" />
</svg>

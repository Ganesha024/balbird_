<svg width="800" height="400" viewBox="0 0 800 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f15a22;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#0b1b3a;stop-opacity:0.05" />
    </linearGradient>
    <radialGradient id="nodeGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#0b1b3a;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#f15a22;stop-opacity:0.9" />
    </radialGradient>
  </defs>
  <rect width="800" height="400" fill="url(#grad1)" />
  <g opacity="0.8">
    <!-- Manufacturing Units -->
    <circle cx="150" cy="200" r="40" fill="url(#nodeGrad)" />
    <text x="150" y="205" text-anchor="middle" fill="white" font-family="sans-serif" font-size="12" font-weight="600">Mfg Units</text>
    
    <!-- OEM Programs -->
    <circle cx="400" cy="120" r="40" fill="url(#nodeGrad)" />
    <text x="400" y="125" text-anchor="middle" fill="white" font-family="sans-serif" font-size="12" font-weight="600">OEM Prog</text>
    
    <!-- Workforce -->
    <circle cx="650" cy="200" r="40" fill="url(#nodeGrad)" />
    <text x="650" y="205" text-anchor="middle" fill="white" font-family="sans-serif" font-size="12" font-weight="600">Workforce</text>
    
    <!-- Industrial Associations -->
    <circle cx="400" cy="280" r="40" fill="url(#nodeGrad)" />
    <text x="400" y="285" text-anchor="middle" fill="white" font-family="sans-serif" font-size="12" font-weight="600">Assoc</text>
    
    <!-- Strategic Financial -->
    <circle cx="550" cy="50" r="30" fill="#f15a22" />
    <text x="550" y="55" text-anchor="middle" fill="white" font-family="sans-serif" font-size="10" font-weight="600">Finance</text>
    
    <!-- Connections -->
    <line x1="190" y1="200" x2="360" y2="140" stroke="#0b1b3a" stroke-width="3" />
    <line x1="440" y1="140" x2="610" y2="200" stroke="#f15a22" stroke-width="3" />
    <line x1="440" y1="260" x2="610" y2="200" stroke="#0b1b3a" stroke-width="3" />
    <line x1="400" y1="80" x2="520" y2="80" stroke="#f15a22" stroke-width="3" />
    <line x1="520" y1="80" x2="440" y2="160" stroke="#0b1b3a" stroke-width="3" />
  </g>
</svg>

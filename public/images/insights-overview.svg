<svg width="700" height="400" viewBox="0 0 700 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="insight1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0b1b3a;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#0b1b3a;stop-opacity:0.6" />
    </linearGradient>
    <linearGradient id="insight2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f15a22;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#f15a22;stop-opacity:0.6" />
    </linearGradient>
  </defs>
  <!-- Article Structure -->
  <g transform="translate(50,100)">
    <rect x="0" y="0" width="300" height="160" rx="8" fill="url(#insight1)" />
    <text x="20" y="30" fill="white" font-family="sans-serif" font-size="16" font-weight="600">Article Structure</text>
    <text x="20" y="55" fill="white" font-family="sans-serif" font-size="12">• Title & Summary</text>
    <text x="20" y="75" fill="white" font-family="sans-serif" font-size="12">• Sector Tags</text>
    <text x="20" y="95" fill="white" font-family="sans-serif" font-size="12">• Key Takeaways</text>
    <text x="20" y="115" fill="white" font-family="sans-serif" font-size="12">• Related Resources</text>
    <text x="20" y="135" fill="white" font-family="sans-serif" font-size="12">• Active Requirements</text>
  </g>
  
  <!-- Filters -->
  <g transform="translate(380,100)">
    <rect x="0" y="0" width="280" height="160" rx="8" fill="url(#insight2)" />
    <text x="20" y="30" fill="white" font-family="sans-serif" font-size="16" font-weight="600">Filter Options</text>
    <text x="20" y="55" fill="white" font-family="sans-serif" font-size="12">• Aerospace</text>
    <text x="20" y="75" fill="white" font-family="sans-serif" font-size="12">• Automotive EV</text>
    <text x="20" y="95" fill="white" font-family="sans-serif" font-size="12">• Capacity Trends</text>
    <text x="20" y="115" fill="white" font-family="sans-serif" font-size="12">• Compliance Updates</text>
    <text x="20" y="135" fill="white" font-family="sans-serif" font-size="12">• Workforce Development</text>
  </g>
  
  <!-- Connection -->
  <line x1="350" y1="180" x2="380" y2="180" stroke="#0b1b3a" stroke-width="3" />
</svg>

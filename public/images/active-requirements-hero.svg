<svg width="800" height="400" viewBox="0 0 800 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f15a22;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#0b1b3a;stop-opacity:0.05" />
    </linearGradient>
    <radialGradient id="nodeGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#0b1b3a;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#f15a22;stop-opacity:0.8" />
    </radialGradient>
  </defs>
  <rect width="800" height="400" fill="url(#grad1)" />
  <g opacity="0.8">
    <!-- Filter Panel -->
    <rect x="50" y="100" width="200" height="200" rx="8" fill="url(#nodeGrad)" />
    <text x="70" y="130" fill="white" font-family="sans-serif" font-size="14" font-weight="600">Filters</text>
    <rect x="70" y="140" width="60" height="4" rx="2" fill="#f15a22" />
    <rect x="70" y="160" width="80" height="4" rx="2" fill="#f15a22" />
    <rect x="70" y="180" width="70" height="4" rx="2" fill="#f15a22" />
    <rect x="70" y="200" width="90" height="4" rx="2" fill="#f15a22" />
    <rect x="70" y="220" width="65" height="4" rx="2" fill="#f15a22" />
    <rect x="70" y="240" width="75" height="4" rx="2" fill="#f15a22" />
    
    <!-- Table -->
    <rect x="300" y="80" width="450" height="240" rx="8" fill="white" stroke="#0b1b3a" stroke-width="2" />
    <rect x="320" y="100" width="410" height="20" rx="4" fill="#f15a22" />
    <rect x="320" y="130" width="410" height="4" rx="2" fill="#0b1b3a" opacity="0.3" />
    <rect x="320" y="150" width="410" height="4" rx="2" fill="#0b1b3a" opacity="0.3" />
    <rect x="320" y="170" width="410" height="4" rx="2" fill="#0b1b3a" opacity="0.3" />
    <rect x="320" y="190" width="410" height="4" rx="2" fill="#0b1b3a" opacity="0.3" />
    <rect x="320" y="210" width="410" height="4" rx="2" fill="#0b1b3a" opacity="0.3" />
    <rect x="320" y="230" width="410" height="4" rx="2" fill="#0b1b3a" opacity="0.3" />
    <rect x="320" y="250" width="410" height="4" rx="2" fill="#0b1b3a" opacity="0.3" />
    
    <!-- Detail Panel -->
    <rect x="550" y="40" width="180" height="120" rx="8" fill="url(#nodeGrad)" />
    <text x="570" y="70" fill="white" font-family="sans-serif" font-size="12" font-weight="600">Details</text>
    <rect x="570" y="80" width="80" height="3" rx="1.5" fill="#f15a22" />
    <rect x="570" y="90" width="100" height="3" rx="1.5" fill="#f15a22" />
    <rect x="570" y="100" width="60" height="3" rx="1.5" fill="#f15a22" />
    <rect x="570" y="110" width="90" height="3" rx="1.5" fill="#f15a22" />
    <rect x="570" y="120" width="70" height="3" rx="1.5" fill="#f15a22" />
    <rect x="570" y="130" width="85" height="3" rx="1.5" fill="#f15a22" />
  </g>
</svg>

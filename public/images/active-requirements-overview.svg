<svg width="700" height="400" viewBox="0 0 700 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="req1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0b1b3a;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#0b1b3a;stop-opacity:0.6" />
    </linearGradient>
    <linearGradient id="req2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f15a22;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#f15a22;stop-opacity:0.6" />
    </linearGradient>
    <linearGradient id="req3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0b1b3a;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#0b1b3a;stop-opacity:0.6" />
    </linearGradient>
  </defs>
  <!-- Requirements Blocks -->
  <g transform="translate(50,100)">
    <rect x="0" y="0" width="180" height="120" rx="8" fill="url(#req1)" />
    <text x="20" y="30" fill="white" font-family="sans-serif" font-size="16" font-weight="600">Filters</text>
    <text x="20" y="50" fill="white" font-family="sans-serif" font-size="12">Sector</text>
    <text x="20" y="70" fill="white" font-family="sans-serif" font-size="12">Stakeholder</text>
    <text x="20" y="90" fill="white" font-family="sans-serif" font-size="12">Capacity</text>
    <text x="20" y="110" fill="white" font-family="sans-serif" font-size="12">Compliance</text>
  </g>
  
  <g transform="translate(260,60)">
    <rect x="0" y="0" width="180" height="160" rx="8" fill="url(#req2)" />
    <text x="20" y="30" fill="white" font-family="sans-serif" font-size="16" font-weight="600">Table View</text>
    <text x="20" y="50" fill="#0b1b3a" font-family="sans-serif" font-size="12">Stakeholder</text>
    <text x="20" y="70" fill="#0b1b3a" font-family="sans-serif" font-size="12">Sector</text>
    <text x="20" y="90" fill="#0b1b3a" font-family="sans-serif" font-size="12">Requirement</text>
    <text x="20" y="110" fill="#0b1b3a" font-family="sans-serif" font-size="12">Status</text>
    <text x="20" y="130" fill="#0b1b3a" font-family="sans-serif" font-size="12">View Details</text>
  </g>
  
  <g transform="translate(470,100)">
    <rect x="0" y="0" width="180" height="140" rx="8" fill="url(#req3)" />
    <text x="20" y="30" fill="white" font-family="sans-serif" font-size="16" font-weight="600">Details</text>
    <text x="20" y="50" fill="white" font-family="sans-serif" font-size="12">Technical Req</text>
    <text x="20" y="70" fill="white" font-family="sans-serif" font-size="12">Capacity</text>
    <text x="20" y="90" fill="white" font-family="sans-serif" font-size="12">Timeline</text>
    <text x="20" y="110" fill="white" font-family="sans-serif" font-size="12">Criteria</text>
  </g>
  
  <!-- Arrows -->
  <path d="M230 160 L260 160" stroke="#0b1b3a" stroke-width="3" marker-end="url(#arrow)" />
  <path d="M440 160 L470 160" stroke="#f15a22" stroke-width="3" marker-end="url(#arrow)" />
  
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#0b1b3a" />
    </marker>
  </defs>
</svg>

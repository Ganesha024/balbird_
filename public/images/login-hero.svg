<svg width="800" height="400" viewBox="0 0 800 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f15a22;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#0b1b3a;stop-opacity:0.05" />
    </linearGradient>
    <radialGradient id="loginGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#0b1b3a;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#f15a22;stop-opacity:0.8" />
    </radialGradient>
  </defs>
  <rect width="800" height="400" fill="url(#grad1)" />
  <g opacity="0.8">
    <!-- Login Portal -->
    <rect x="300" y="120" width="200" height="160" rx="8" fill="url(#loginGrad)" />
    <text x="320" y="150" fill="white" font-family="sans-serif" font-size="16" font-weight="600">Login Portal</text>
    <rect x="320" y="160" width="60" height="4" rx="2" fill="#f15a22" />
    <rect x="320" y="170" width="80" height="4" rx="2" fill="#f15a22" />
    <text x="320" y="200" fill="white" font-family="sans-serif" font-size="12" font-weight="600">Access Dashboard</text>
    <text x="320" y="220" fill="white" font-family="sans-serif" font-size="12" font-weight="600">Role-Based Tools</text>
    <text x="320" y="240" fill="white" font-family="sans-serif" font-size="12" font-weight="600">Secure Platform</text>
    
    <!-- Access Points -->
    <circle cx="250" cy="200" r="25" fill="#0b1b3a" />
    <text x="250" y="205" text-anchor="middle" fill="white" font-family="sans-serif" font-size="10" font-weight="600">Enter</text>
    
    <circle cx="550" cy="200" r="25" fill="#f15a22" />
    <text x="550" y="205" text-anchor="middle" fill="white" font-family="sans-serif" font-size="10" font-weight="600">Access</text>
    
    <!-- Connection -->
    <line x1="275" y1="200" x2="300" y2="200" stroke="#0b1b3a" stroke-width="4" />
    <line x1="500" y1="200" x2="525" y2="200" stroke="#f15a22" stroke-width="4" />
  </g>
</svg>
